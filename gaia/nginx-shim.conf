server {
    listen 9091;

    # Lemonade model loader → no-op 200 (llama.cpp has no model loading API)
    location = /api/v1/load-model {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Lemonade stats → no-op 200
    location = /stats {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Lemonade system-info → no-op 200
    location = /system-info {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # The critical one: rewrite /api/v1/* → /v1/*
    location /api/v1/ {
        proxy_pass http://host.docker.internal:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Pass everything else through as-is
    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
